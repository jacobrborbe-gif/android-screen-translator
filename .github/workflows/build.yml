name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Auto-Patch Manifest Conflicts
        run: |
          find . -name "AndroidManifest.xml" -exec sed -i 's/android:allowBackup="true"/android:allowBackup="false"/g' {} +

      - name: Generate Mega Google Services JSON
        shell: python
        run: |
          import json
          packages = [
              "com.galaxy.airv.dictionary",
              "com.galaxy.airv.screen_translator",
              "com.galaxy.airv.new_ui",
              "com.galaxy.airv.screen_translator_new_ui",
              "com.galaxy.airv.dictionary.app-dev",
              "com.galaxy.airv.dictionary-screen-translator",
              "com.galaxy.airv.dictionary.app-dev-screen-translator",
              "com.galaxy.airv.screen_translator-app-dev",
              "com.galaxy.airv.screen_translator-screen-translator-app-dev",
              "com.galaxy.airv.screen_translator_new_ui-screen-translator",
              "com.galaxy.airv.screen_translator.app-dev-screen-translator",
              "com.galaxy.airv.new_ui.app-dev-screen-translator",
              "com.galaxy.airv.screen_translator_new_ui.app-dev"
          ]
          data = {
              "project_info": {
                  "project_number": "12345",
                  "project_id": "dummy",
                  "storage_bucket": "dummy.appspot.com"
              },
              "client": []
          }
          for i, pkg in enumerate(packages):
              data["client"].append({
                  "client_info": {
                      "mobilesdk_app_id": f"1:12345:android:fakeid{i}",
                      "android_client_info": { "package_name": pkg }
                  },
                  "api_key": [{"current_key": "dummy"}],
                  "services": {"appinvite_service": {"status": 1}}
              })
          with open("app/google-services.json", "w") as f:
              json.dump(data, f, indent=2)

      - name: Inject Fake Signing Configs
        run: |
          echo "KEYSTORE_FILE=dummy" >> gradle.properties
          echo "KEY_ALIAS=dummy" >> gradle.properties
          echo "KEY_PASSWORD=dummy" >> gradle.properties

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Compile Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ScreenTranslator-APK
          path: app/build/outputs/apk/debug/app-
          debug.apk
