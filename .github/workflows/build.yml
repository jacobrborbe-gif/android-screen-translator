name: Build Android APK

on:
  workflow_dispatch: # Allows you to trigger this manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Bypass Firebase Requirement
        run: |
          echo '{"project_info":{"project_number":"123","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:123","android_client_info":{"package_name":"com.galaxy.airv"}},"api_key":[{"current_key":"dummy"}],"services":{"appinvite_service":{"status":1}}}]}' > app/google-services.json

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Compile Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ScreenTranslator-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          
